name: CI

on:
  push:
    branches: [main, windowsbuild]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libappindicator3-dev librsvg2-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test
        working-directory: src-tauri
